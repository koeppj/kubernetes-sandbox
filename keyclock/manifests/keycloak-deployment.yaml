apiVersion: apps/v1
kind: Deployment
metadata:
  name: keycloak
  namespace: keycloak
spec:
  replicas: 1
  selector:
    matchLabels:
      app: keycloak
  template:
    metadata:
      labels:
        app: keycloak
    spec:
      initContainers:
      - name: wait-for-postgres
        image: alpine/psql
        command: ["sh", "-c"]
        args:
        - >
          until PGPASSWORD="$POSTGRES_PASSWORD" pg_isready -h postgres-keycloak -p 5432 -U "$POSTGRES_USER" -d keycloak;
          do echo "waiting for postgres"; sleep 2; done
        env:
        - name: POSTGRES_USER
          valueFrom:
            secretKeyRef:
              name: postgres-secret
              key: POSTGRES_USER
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: postgres-secret
              key: POSTGRES_PASSWORD
      containers:
      - name: keycloak
        image: quay.io/keycloak/keycloak:26.3.3
        args: ["start"]
        ports:
        - containerPort: 8080
          name: http
        - name: jgroups
          containerPort: 7800
        - name: jgroups-fd
          containerPort: 57800
        startupProbe:
          httpGet:
            path: /health/started
            port: 9000
          periodSeconds: 1
          failureThreshold: 600              
        readinessProbe:
          httpGet:
            path: /health/ready
            port: 9000
          periodSeconds: 10
          failureThreshold: 3              
        livenessProbe:
          httpGet:
            path: /health/live
            port: 9000
          periodSeconds: 10
          failureThreshold: 3              
        env:
        # JVM heap sizing (REQUIRED)
        - name: JAVA_OPTS_APPEND
          value: "-Xms256m -Xmx750m"

        # Database
        - name: KC_DB
          value: postgres
        - name: KC_DB_URL_HOST
          value: postgres-keycloak
        - name: KC_DB_URL_DATABASE
          value: keycloak
        - name: KC_DB_USERNAME
          valueFrom:
            secretKeyRef:
              name: postgres-secret
              key: POSTGRES_USER
        - name: KC_DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: postgres-secret
              key: POSTGRES_PASSWORD

        # Admin bootstrap
        - name: KC_BOOTSTRAP_ADMIN_USERNAME
          valueFrom:
            secretKeyRef:
              name: keycloak-secret
              key: KEYCLOAK_ADMIN
        - name: KC_BOOTSTRAP_ADMIN_PASSWORD
          valueFrom:
            secretKeyRef:
              name: keycloak-secret
              key: KEYCLOAK_ADMIN_PASSWORD

        # Production + proxy
        - name: KC_HOSTNAME
          value: idp.johnkoepp.com
        - name: KC_HOSTNAME_STRICT
          value: "false"
        - name: KC_PROXY
          value: edge
        - name: KC_PROXY_HEADERS
          value: xforwarded
        - name: KC_HTTP_ENABLED
          value: "true"
        - name: KC_HEALTH_ENABLED
          value: "true"
        - name: KC_METRICS_ENABLED
          value: "true"
        - name: KC_HOSTNAME_STRICT_HTTPS
          value: "true"

        resources:
          requests:
            memory: 512Mi
            cpu: 250m
          limits:
            memory: 1Gi
            cpu: 1

        volumeMounts:
        - name: keycloak-data
          mountPath: /opt/keycloak/data

      volumes:
      - name: keycloak-data
        persistentVolumeClaim:
          claimName: keycloak-data
